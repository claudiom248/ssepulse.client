name: ci

on:
  pull_request:
    branches: [ master, develop, feature/*, hotfix/*, release/* ]
  push:
    branches: [ master, develop, feature/*, hotfix/*, release/* ]
  workflow_dispatch:
  
permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        tfm: [ net10.0, net9.0, net8.0 ]
        include:
          - os: windows-latest
            tfm: net462

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
 
      - name: Build and test
        run: ./.scripts/build-and-test.ps1 -Configuration Release -RunTests -Framework ${{ matrix.tfm }} -TestResultsDirectory .artifacts/test-results/${{ matrix.os }}/${{ matrix.tfm }}
        shell: pwsh

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: (success() || failure())
        with:
          name: .NET Tests - ${{ matrix.os }} - ${{ matrix.tfm }}
          path: '.artifacts/test-results/${{ matrix.os }}/${{ matrix.tfm }}/**/*.trx'
          reporter: dotnet-trx
          fail-on-error: 'false'

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: logs-${{ matrix.os }}-${{ matrix.tfm }}
          path: | 
            msbuild.binlog
            .artifacts/test-results/${{ matrix.os }}/${{ matrix.tfm }}/**/*.trx

  pack:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore tools
        run: dotnet tool restore
        shell: pwsh

      - name: Calculate package version
        id: gitversion
        run: |
          $version = dotnet tool run dotnet-gitversion /output json /showvariable NuGetVersion
          if ($LASTEXITCODE -ne 0) { exit 1 }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Using package version $version"
        shell: pwsh

      - name: Pack
        run: ./.scripts/pack.ps1 -Configuration Release -Version "${{ steps.gitversion.outputs.version }}"
        shell: pwsh

      - name: Push packages to GitHub Packages
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          PACKAGE_VERSION: ${{ steps.gitversion.outputs.version }}
        run: |
          $feed = "https://nuget.pkg.github.com/$env:GITHUB_OWNER/index.json"
          $packageDirectory = Join-Path $env:GITHUB_WORKSPACE ".artifacts/nuget/Release/$env:PACKAGE_VERSION"

          $packages = Get-ChildItem -Path $packageDirectory -Filter "*.nupkg" |
              Where-Object { $_.Name -notlike "*.symbols.nupkg" }

          foreach ($package in $packages) {
              dotnet nuget push $package.FullName --source $feed --api-key $env:GITHUB_TOKEN --skip-duplicate
          }
        shell: pwsh

