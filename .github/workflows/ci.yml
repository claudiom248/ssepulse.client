name: ci
on:
  pull_request:
    branches: [ main, feature/*, hotfix/* ]
  push:
    branches: [ main, feature/*, hotfix/*, release/* ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
    - uses: actions/checkout@v6
      with:
        ref: ${{github.event.pull_request.head.ref}}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        lfs: true

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
          10.x
          
      name: build
    - run: dotnet tool restore

    - run: dotnet restore

    - run: dotnet build -c Release --maxcpucount --binaryLogger
      shell: bash

    - run: dotnet test -c Release -f net10.0 --no-build --collect:"XPlat Code Coverage" --consoleLoggerParameters:"Summary;Verbosity=Minimal"
      if: matrix.os == 'ubuntu-latest'
      id: test-net100

    - run: dotnet test -c Release -f net9.0 --no-build --collect:"XPlat Code Coverage" --consoleLoggerParameters:"Summary;Verbosity=Minimal"
      if: matrix.os == 'ubuntu-latest'
      id: test-net90

    - run: dotnet test -c Release -f net8.0 --no-build --collect:"XPlat Code Coverage" --consoleLoggerParameters:"Summary;Verbosity=Minimal"
      if: matrix.os == 'ubuntu-latest'
      id: test-net80

    - run: dotnet test -c Release -f net462 --no-build --collect:"XPlat Code Coverage" --consoleLoggerParameters:"Summary;Verbosity=Minimal"
      if: matrix.os == 'windows-latest'
      id: test-netframework462

    - run: dotnet tool run docfx docs/docfx.json
      if: matrix.os == 'ubuntu-latest'

    - uses: actions/upload-pages-artifact@v4
      if: matrix.os == 'ubuntu-latest'
      with:
        path: docs/_site

    - name: Upload Logs
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: logs-${{ matrix.os }}
        path: |
          msbuild.binlog
          test/**/TestResults/*.trx
          test/**/TestResults/*.html

  publish-docs:
    if: > 
      github.event_name == 'push' 
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    needs: [test]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      pages: write
      id-token: write
    steps:
    - id: deployment
      uses: actions/deploy-pages@v4
